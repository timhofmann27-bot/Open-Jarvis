# Pre-commit hooks for Open-Jarvis
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate
repos:
  # ── General file hygiene ───────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=auto]
      - id: detect-private-key
        # Prevent accidental commit of API keys
      - id: no-commit-to-branch
        args: [--branch=main, --pattern=main|master|develop]

  # ── Python: ruff (linter + formatter) ──────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

  # ── Python: black (backup formatter) ──────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12
        args: [--line-length=120]

  # ── Python: import sorting ─────────────────────────────────────
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120]

  # ── Markdown ──────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--fix]
        files: \.(md|markdown)$

  # ── Shell ─────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ── YAML ──────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict]
        files: \.ya?ml$

  # ── Secrets scanning ──────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            config/.*\.example|
            memory/.*|
            docs/.*\.md
          )$

  # ── Custom local hooks ────────────────────────────────────────
  - repo: local
    hooks:
      - id: self-test
        name: Run self-test suite
        entry: python -c "import sys; sys.path.insert(0, '.'); from core.test_suite import TestSuite; t = TestSuite(); r = t.run_all(); sys.exit(0 if r['failed'] == 0 else 1)"
        language: system
        pass_filenames: false
        types: [python]
        stages: [manual]  # Run with: pre-commit run --hook-stage manual self-test
