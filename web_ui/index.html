<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Jarvis Mobile</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:system-ui,-apple-system,sans-serif; background:#0a0e14; color:#e0e8f0; height:100dvh; display:flex; flex-direction:column; }
    #header { background:#0f1a24; border-bottom:1px solid #1a3345; padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
    #header h1 { font-size:1.1rem; font-weight:600; color:#00c8ff; flex:1; }
    #status { font-size:.75rem; color:#6a8fa8; }
    #chat { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; scroll-behavior:smooth; }
    .msg { max-width:85%; padding:10px 14px; border-radius:16px; font-size:.95rem; line-height:1.4; word-wrap:break-word; animation:fadeIn .2s ease; }
    .msg.user { align-self:flex-end; background:#003d5c; color:#e0f0ff; border-bottom-right-radius:4px; }
    .msg.jarvis { align-self:flex-start; background:#101e2a; color:#d0e4f0; border-bottom-left-radius:4px; border:1px solid #1a3345; }
    .msg.system { align-self:center; background:transparent; color:#5a7a8a; font-size:.8rem; padding:4px 10px; }
    .msg pre { background:#0a141e; padding:8px; border-radius:8px; overflow-x:auto; font-size:.85rem; margin-top:6px; white-space:pre-wrap; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    #inputbar { display:flex; gap:8px; padding:10px 12px; background:#0f1a24; border-top:1px solid #1a3345; flex-shrink:0; }
    #inputbar input { flex:1; background:#071018; border:1px solid #1a3345; border-radius:24px; padding:10px 16px; font-size:.95rem; color:#e0e8f0; outline:none; }
    #inputbar input:focus { border-color:#00c8ff; }
    #inputbar button { background:#00c8ff; border:none; border-radius:24px; padding:10px 20px; font-weight:600; color:#021018; font-size:.9rem; cursor:pointer; }
    #inputbar button:active { transform:scale(.96); }
    .typing { align-self:flex-start; color:#5a8a9a; font-size:.8rem; padding:4px 14px; display:none; }
    #bottom { flex-shrink:0; text-align:center; padding:6px; font-size:.7rem; color:#3a5a6a; }
    #bottom a { color:#3a8aaa; text-decoration:none; }
  </style>
</head>
<body>
  <div id="header"><h1>Jarvis</h1><div id="status">getrennt</div></div>
  <div id="chat"></div>
  <div class="typing" id="typing">Jarvis denkt nach...</div>
  <div id="inputbar">
    <input id="input" type="text" placeholder="Nachricht eingeben..." autocomplete="off" />
    <button id="send">Senden</button>
  </div>
  <div id="bottom"><a href="#" onclick="showToken()">Token eingeben</a> &middot; <span id="ipinfo"></span></div>
  <script>
    const $ = id => document.getElementById(id);
    const chat = $('chat'), input = $('input'), statusEl = $('status'), typing = $('typing'), sendBtn = $('send');
    let token = localStorage.getItem('jarvis_token') || '';
    let lastMsg = '';

    function addMsg(text, cls) {
      const d = document.createElement('div');
      d.className = 'msg ' + cls;
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function addSystem(text) {
      const d = document.createElement('div');
      d.className = 'msg system';
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    async function updateStatus() {
      try {
        const r = await fetch('/api/status');
        if (r.ok) {
          const d = await r.json();
          statusEl.textContent = 'verbunden';
          $('ipinfo').textContent = d.local_ip + ':' + d.port;
        } else statusEl.textContent = 'fehler';
      } catch { statusEl.textContent = 'offline'; }
    }

    async function sendMessage(text) {
      if (!text || text === lastMsg) return;
      lastMsg = text;
      addMsg(text, 'user');
      input.value = '';
      typing.style.display = 'block';
      try {
        const r = await fetch('/api/command', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ goal: text, api_token: token || undefined })
        });
        const data = await r.json();
        typing.style.display = 'none';
        const reply = data.result || data.error || 'Keine Antwort.';
        addMsg(reply, 'jarvis');
      } catch (err) {
        typing.style.display = 'none';
        addMsg('Verbindungsfehler: ' + err.message, 'jarvis');
      }
    }

    function showToken() {
      const t = prompt('API-Token (leer zum Entfernen):');
      if (t !== null) {
        token = t.trim();
        localStorage.setItem('jarvis_token', token);
        addSystem(token ? 'Token gesetzt' : 'Token entfernt');
      }
    }

    sendBtn.onclick = () => sendMessage(input.value.trim());
    input.onkeydown = e => { if (e.key === 'Enter') sendMessage(input.value.trim()); };
    updateStatus();
    setInterval(updateStatus, 30000);
    addSystem('Verbunden. Sende einen Befehl an Jarvis.');
  </script>
</body>
</html>
